<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mwe Sein - Gallery</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: system-ui, -apple-system, sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 50; pointer-events: none; }

        #gallery-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; z-index: 100;
        }

        .slider { 
            display: flex; 
            height: 100%; 
            will-change: transform; 
            align-items: center;
        }

        .slide { 
            min-width: 100vw; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .slide img { 
            max-width: 88%; 
            max-height: 78%; 
            object-fit: contain; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            pointer-events: none;
            /* 稍微降低缩放感，让切换更平滑 */
            transform: scale(0.98);
            transition: transform 0.3s ease-out;
        }

        .slide.active img { transform: scale(1); }

        .info-overlay {
            position: absolute; bottom: 12%; width: 100%; text-align: center; color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            pointer-events: none;
        }
        .info-overlay h3 { margin: 0; font-size: clamp(22px, 6vw, 32px); color: #42c8f5; font-weight: 700; }

        .dots { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 110; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: 0.2s; }
        .dot.active { background: #42c8f5; transform: scale(1.4); }

        #hint {
            position: absolute; top: 40px; width: 100%; text-align: center;
            color: rgba(66, 200, 245, 0.4); font-size: 11px; letter-spacing: 4px;
            z-index: 110;
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="gallery-container">
    <div id="hint">✦ SLIDE ✦</div>
    <div class="slider" id="main-slider">
        <div class="slide active"><img src="mwe1.jpg" alt="1"><div class="info-overlay"><h3>Mwe Sein</h3></div></div>
        <div class="slide"><img src="mwe2.jpg" alt="2"></div>
        <div class="slide"><img src="mwe3.jpg" alt="3"></div>
        <div class="slide"><img src="mwe4.jpg" alt="4"></div>
        <div class="slide"><img src="mwe5.jpg" alt="5"></div>
        <div class="slide"><img src="mwe6.jpg" alt="6"><div class="info-overlay"><h3>Happy Birthday!</h3></div></div>
    </div>
    <div class="dots" id="dot-container"></div>
</div>

<script>
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let w, h, particles = [];

function resize() {
    w = pCanvas.width = window.innerWidth;
    h = pCanvas.height = window.innerHeight;
    initParticles();
}

function initParticles() {
    particles = [];
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            size: Math.random() * 1.5,
            speed: Math.random() * 0.4 + 0.1,
            opacity: Math.random() * 0.5 + 0.2
        });
    }
}

function animateParticles() {
    pCtx.clearRect(0, 0, w, h);
    pCtx.fillStyle = "#42c8f5";
    particles.forEach(p => {
        p.y -= p.speed;
        if (p.y < -10) p.y = h + 10;
        pCtx.globalAlpha = p.opacity;
        pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); pCtx.fill();
    });
    requestAnimationFrame(animateParticles);
}

function initGallery() {
    const slider = document.getElementById('main-slider');
    const slides = document.querySelectorAll('.slide');
    const dotContainer = document.getElementById('dot-container');
    let currentIndex = 0, isDragging = false, startX = 0, currentTranslate = 0, prevTranslate = 0;

    slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = i === 0 ? 'dot active' : 'dot';
        dotContainer.appendChild(d);
    });

    const dots = document.querySelectorAll('.dot');

    function updateSlideStatus() {
        slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex));
        dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
    }

    function onStart(e) {
        isDragging = true;
        startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        slider.style.transition = 'none'; // 开始拖拽时取消过渡，实现“跟手”
        prevTranslate = currentIndex * -window.innerWidth;
    }

    function onMove(e) {
        if (!isDragging) return;
        const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        currentTranslate = prevTranslate + (currentX - startX);
        slider.style.transform = `translateX(${currentTranslate}px)`;
    }

    function onEnd() {
        isDragging = false;
        const movedBy = currentTranslate - prevTranslate;

        // 阈值设为 40px，轻轻一划即翻页
        if (movedBy < -40 && currentIndex < slides.length - 1) currentIndex++;
        else if (movedBy > 40 && currentIndex > 0) currentIndex--;

        // 使用快速且清爽的曲线
        slider.style.transition = 'transform 0.35s cubic-bezier(0.1, 0.8, 0.2, 1)';
        currentTranslate = currentIndex * -window.innerWidth;
        prevTranslate = currentTranslate;
        slider.style.transform = `translateX(${currentTranslate}px)`;
        updateSlideStatus();
    }

    slider.addEventListener('touchstart', onStart, { passive: true });
    slider.addEventListener('touchmove', onMove, { passive: true });
    slider.addEventListener('touchend', onEnd);
    slider.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('resize', () => {
        currentTranslate = currentIndex * -window.innerWidth;
        prevTranslate = currentTranslate;
        slider.style.transform = `translateX(${currentTranslate}px)`;
    });
}

window.addEventListener('resize', resize);
resize();
animateParticles();
initGallery();
</script>
</body>
</html>
